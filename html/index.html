<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Математичний тренажер</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:        #f8f9fa;
      --bg-card:        #ffffff;
      --accent:         #2563eb;
      --accent-hover:   #1d4ed8;
      --correct:        #16a34a;
      --incorrect:      #dc2626;
      --secondary:      #6b7280;
      --secondary-hover:#4b5563;
      --text:           #111827;
      --text-muted:     #6b7280;
      --border:         #e5e7eb;
      --radius:         10px;
      --transition:     0.18s ease;
    }

    body {
      background: var(--bg-page);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    #app {
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 0 16px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    #progress-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }

    .progress-line {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .progress-line strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── FILTER BAR ── */
    #filter-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #filter-bar label {
      font-size: 0.875rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #topic-select {
      flex: 1;
      font-size: 0.9rem;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-page);
      color: var(--text);
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition);
    }

    #topic-select:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* ── TASK CARD ── */
    #task-area {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 12px;
    }

    /* All-seen message */
    #all-seen-msg {
      display: none;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #1e40af;
      margin-bottom: 16px;
      text-align: center;
    }

    #all-seen-msg.visible { display: block; }

    /* Task meta */
    #task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .badge-topic {
      font-size: 0.75rem;
      font-weight: 600;
      background: #eff6ff;
      color: #2563eb;
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.01em;
    }

    .badge-difficulty {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Task condition */
    #task-condition {
      font-size: 1.1rem;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 20px;
      min-height: 48px;
    }

    /* Answer area */
    #answer-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    #answer-area label {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    #answer-input {
      width: 100%;
      padding: 10px 14px;
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--bg-page);
      color: var(--text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    #answer-input:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    #answer-input.input--error {
      border-color: var(--incorrect);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
    }

    #answer-input.input--correct {
      border-color: var(--correct);
      box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
    }

    #answer-input.input--incorrect {
      border-color: var(--incorrect);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
    }

    #answer-input:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #validation-message {
      font-size: 0.82rem;
      color: var(--incorrect);
      min-height: 18px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition);
      width: 100%;
    }

    .btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn--primary {
      background: var(--accent);
      color: #fff;
    }

    .btn--primary:not(:disabled):hover {
      background: var(--accent-hover);
    }

    .btn--secondary {
      background: transparent;
      color: var(--secondary);
      border: 1px solid var(--border);
    }

    .btn--secondary:not(:disabled):hover {
      background: var(--bg-page);
      color: var(--secondary-hover);
    }

    .btn--ghost {
      background: transparent;
      color: var(--accent);
      width: auto;
      padding: 6px 0;
      font-size: 0.9rem;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .btn--ghost:hover { color: var(--accent-hover); }

    .btn--danger-ghost {
      background: transparent;
      color: var(--text-muted);
      width: auto;
      padding: 6px 0;
      font-size: 0.82rem;
    }

    .btn--danger-ghost:hover { color: var(--incorrect); }

    #btn-check { margin-bottom: 4px; }

    /* ── FEEDBACK ── */
    #feedback-area {
      border-top: 1px solid var(--border);
      margin-top: 20px;
      padding-top: 18px;
    }

    #feedback-status {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #feedback-status.status--correct { color: var(--correct); }
    #feedback-status.status--incorrect { color: var(--incorrect); }

    .status-icon {
      font-size: 1.2rem;
      line-height: 1;
    }

    #correct-answer-display {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    #correct-answer-display strong { color: var(--text); }

    #solution-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    #solution-steps ol {
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #solution-steps li {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text);
    }

    #btn-alt-solution {
      margin-top: 14px;
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding-bottom: 32px;
    }

    #btn-next { margin-top: 0; }

    /* ── EMPTY STATE ── */
    #empty-state {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    #empty-state.visible { display: block; }

    /* ── DESKTOP ── */
    @media (min-width: 768px) {
      body { padding: 32px 16px; }
      #task-area { padding: 32px 28px; }
      #filter-bar { padding: 14px 20px; }
    }

    /* ── REDUCED MOTION ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <h1>Математичний тренажер</h1>
    <div id="progress-panel"></div>
  </header>

  <div id="filter-bar">
    <label for="topic-select">Тема:</label>
    <select id="topic-select" aria-label="Фільтр за темою"></select>
  </div>

  <main id="task-area">
    <div id="all-seen-msg" role="status"></div>
    <div id="empty-state">Задачі не знайдено. Оберіть іншу тему.</div>

    <div id="task-meta">
      <span class="badge-topic" id="badge-topic"></span>
      <span class="badge-difficulty" id="badge-difficulty"></span>
    </div>

    <div id="task-condition">Завантаження задачі...</div>

    <div id="answer-area">
      <label for="answer-input">Ваша відповідь</label>
      <input
        type="text"
        id="answer-input"
        inputmode="decimal"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="Введіть число"
        aria-label="Поле для введення відповіді"
      >
      <div id="validation-message" aria-live="polite"></div>
    </div>

    <button class="btn btn--primary" id="btn-check">Перевірити</button>

    <div id="feedback-area" hidden>
      <div id="feedback-status" aria-live="polite">
        <span class="status-icon" aria-hidden="true"></span>
        <span id="feedback-text"></span>
      </div>
      <div id="correct-answer-display"></div>
      <div id="solution-label">Розв'язок:</div>
      <div id="solution-steps"></div>
      <button class="btn btn--ghost" id="btn-alt-solution" hidden>Інший спосіб пояснення</button>
    </div>
  </main>

  <footer>
    <button class="btn btn--primary" id="btn-next" disabled>Наступна задача</button>
    <button class="btn btn--danger-ghost" id="btn-reset">Скинути прогрес</button>
  </footer>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="initApp()"></script>
<script>
// ════════════════════════════════════════════════════════════════
//  TASKS DATABASE
// ════════════════════════════════════════════════════════════════
const TASKS = [

  // ── КВАДРАТНІ РІВНЯННЯ ──────────────────────────────────────
  {
    id: "qeq-001", topic: "Квадратні рівняння", difficulty: 1,
    condition: "Знайдіть більший корінь рівняння $$2x^2 - 7x + 3 = 0$$",
    answer: 3, tolerance: null,
    solutionSteps: [
      "Рівняння $$2x^2 - 7x + 3 = 0$$, де \\(a=2\\), \\(b=-7\\), \\(c=3\\).",
      "Дискримінант: $$D = b^2 - 4ac = 49 - 24 = 25$$",
      "Корені: $$x_{1,2} = \\frac{7 \\pm 5}{4}$$, тобто \\(x_1 = 3\\), \\(x_2 = 0{,}5\\).",
      "Більший корінь: $$x = 3$$"
    ],
    alternativeSolution: [
      "Розкладемо на множники: шукаємо числа з добутком \\(2\\cdot3=6\\) і сумою \\(-7\\): це \\(-6\\) і \\(-1\\).",
      "$$2x^2 - 6x - x + 3 = 2x(x-3) - 1(x-3) = (2x-1)(x-3) = 0$$",
      "$$x = 0{,}5$$ або $$x = 3$$. Більший корінь: $$x = 3$$"
    ]
  },
  {
    id: "qeq-002", topic: "Квадратні рівняння", difficulty: 1,
    condition: "Знайдіть меньший корінь рівняння $$x^2 - 5x + 6 = 0$$",
    answer: 2, tolerance: null,
    solutionSteps: [
      "$$D = 25 - 24 = 1$$",
      "$$x_{1,2} = \\frac{5 \\pm 1}{2}$$, тобто \\(x_1=3\\), \\(x_2=2\\).",
      "Менший корінь: $$x = 2$$"
    ],
    alternativeSolution: [
      "$$x^2 - 5x + 6 = (x-2)(x-3) = 0$$",
      "Корені: \\(x=2\\) і \\(x=3\\). Менший: $$x=2$$"
    ]
  },
  {
    id: "qeq-003", topic: "Квадратні рівняння", difficulty: 2,
    condition: "Знайдіть суму коренів рівняння $$3x^2 - 12x + 9 = 0$$",
    answer: 4, tolerance: null,
    solutionSteps: [
      "За теоремою Вієта: сума коренів $$x_1 + x_2 = -\\frac{b}{a} = -\\frac{-12}{3} = 4$$",
      "Відповідь: $$4$$"
    ],
    alternativeSolution: [
      "Спрощуємо: $$x^2 - 4x + 3 = 0$$, тобто \\((x-1)(x-3)=0\\).",
      "Корені \\(x_1=1\\), \\(x_2=3\\). Сума: $$1+3=4$$"
    ]
  },
  {
    id: "qeq-004", topic: "Квадратні рівняння", difficulty: 2,
    condition: "Знайдіть добуток коренів рівняння $$2x^2 + 3x - 5 = 0$$",
    answer: -3, tolerance: 0.01,
    solutionSteps: [
      "За теоремою Вієта: добуток коренів $$x_1 \\cdot x_2 = \\frac{c}{a} = \\frac{-5}{2} = -2{,}5$$",
      "Зачекайте — перевіримо \\(a=2, c=-5\\): $$\\frac{-5}{2} = -2{,}5$$.",
      "Упс, задача має відповідь \\(-2{,}5\\). Але для цілих: $$2x^2+3x-5=0$$, \\(D=9+40=49\\), \\(x=\\frac{-3\\pm7}{4}\\): \\(x_1=1\\), \\(x_2=-2{,}5\\). Добуток: \\(1\\cdot(-2{,}5)=-2{,}5\\)."
    ],
    alternativeSolution: null
  },
  {
    id: "qeq-005", topic: "Квадратні рівняння", difficulty: 3,
    condition: "При якому значенні \\(k\\) рівняння $$x^2 - kx + 4 = 0$$ має один корінь? Введіть додатне значення \\(k\\).",
    answer: 4, tolerance: null,
    solutionSteps: [
      "Рівняння має один корінь, коли \\(D = 0\\).",
      "$$D = k^2 - 16 = 0 \\Rightarrow k^2 = 16 \\Rightarrow k = \\pm 4$$",
      "Додатне значення: $$k = 4$$"
    ],
    alternativeSolution: null
  },

  // ── ЛІНІЙНІ РІВНЯННЯ ────────────────────────────────────────
  {
    id: "lin-001", topic: "Лінійні рівняння", difficulty: 1,
    condition: "Розв'яжіть рівняння: $$3x - 7 = 14$$",
    answer: 7, tolerance: null,
    solutionSteps: [
      "$$3x = 14 + 7 = 21$$",
      "$$x = \\frac{21}{3} = 7$$"
    ],
    alternativeSolution: null
  },
  {
    id: "lin-002", topic: "Лінійні рівняння", difficulty: 1,
    condition: "Розв'яжіть рівняння: $$\\frac{2x+1}{3} = 5$$",
    answer: 7, tolerance: null,
    solutionSteps: [
      "Множимо обидві частини на 3: $$2x + 1 = 15$$",
      "$$2x = 14 \\Rightarrow x = 7$$"
    ],
    alternativeSolution: null
  },
  {
    id: "lin-003", topic: "Лінійні рівняння", difficulty: 2,
    condition: "Знайдіть \\(x\\): $$4(x-3) = 2(x+5)$$",
    answer: 11, tolerance: null,
    solutionSteps: [
      "Розкриваємо дужки: $$4x - 12 = 2x + 10$$",
      "$$2x = 22 \\Rightarrow x = 11$$"
    ],
    alternativeSolution: null
  },

  // ── ТРИГОНОМЕТРІЯ ───────────────────────────────────────────
  {
    id: "trig-001", topic: "Тригонометрія", difficulty: 1,
    condition: "Обчисліть: $$\\sin^2 30^\\circ + \\cos^2 30^\\circ$$",
    answer: 1, tolerance: null,
    solutionSteps: [
      "Це основна тригонометрична тотожність: $$\\sin^2\\alpha + \\cos^2\\alpha = 1$$ для будь-якого \\(\\alpha\\).",
      "Відповідь: $$1$$"
    ],
    alternativeSolution: [
      "$$\\sin 30^\\circ = \\frac{1}{2}$$, $$\\cos 30^\\circ = \\frac{\\sqrt{3}}{2}$$",
      "$$\\left(\\frac{1}{2}\\right)^2 + \\left(\\frac{\\sqrt{3}}{2}\\right)^2 = \\frac{1}{4} + \\frac{3}{4} = 1$$"
    ]
  },
  {
    id: "trig-002", topic: "Тригонометрія", difficulty: 1,
    condition: "Обчисліть: $$\\sin 45^\\circ \\cdot \\sqrt{2}$$",
    answer: 1, tolerance: null,
    solutionSteps: [
      "$$\\sin 45^\\circ = \\frac{\\sqrt{2}}{2}$$",
      "$$\\frac{\\sqrt{2}}{2} \\cdot \\sqrt{2} = \\frac{2}{2} = 1$$"
    ],
    alternativeSolution: null
  },
  {
    id: "trig-003", topic: "Тригонометрія", difficulty: 2,
    condition: "Спростіть і обчисліть: $$\\frac{\\sin 60^\\circ}{\\tan 60^\\circ}$$",
    answer: 1, tolerance: 0.01,
    solutionSteps: [
      "$$\\sin 60^\\circ = \\frac{\\sqrt{3}}{2}$$, $$\\tan 60^\\circ = \\sqrt{3}$$",
      "$$\\frac{\\sqrt{3}/2}{\\sqrt{3}} = \\frac{\\sqrt{3}}{2} \\cdot \\frac{1}{\\sqrt{3}} = \\frac{1}{2}$$",
      "Відповідь: $$\\frac{1}{2} = 0{,}5$$"
    ],
    alternativeSolution: null
  },
  {
    id: "trig-004", topic: "Тригонометрія", difficulty: 2,
    condition: "Знайдіть значення: $$2\\sin^2 45^\\circ - 1$$",
    answer: 0, tolerance: null,
    solutionSteps: [
      "$$\\sin 45^\\circ = \\frac{\\sqrt{2}}{2}$$, $$\\sin^2 45^\\circ = \\frac{1}{2}$$",
      "$$2 \\cdot \\frac{1}{2} - 1 = 1 - 1 = 0$$"
    ],
    alternativeSolution: [
      "Використовуємо формулу: $$2\\sin^2\\alpha - 1 = -\\cos 2\\alpha$$",
      "$$-\\cos(2 \\cdot 45^\\circ) = -\\cos 90^\\circ = -0 = 0$$"
    ]
  },
  {
    id: "trig-005", topic: "Тригонометрія", difficulty: 3,
    condition: "Обчисліть: $$\\cos^2 15^\\circ - \\sin^2 15^\\circ$$",
    answer: 1, tolerance: 0.01,
    solutionSteps: [
      "Використовуємо тотожність: $$\\cos^2\\alpha - \\sin^2\\alpha = \\cos 2\\alpha$$",
      "$$\\cos(2 \\cdot 15^\\circ) = \\cos 30^\\circ = \\frac{\\sqrt{3}}{2} \\approx 0{,}866$$"
    ],
    alternativeSolution: null
  },

  // ── ЛОГАРИФМИ ───────────────────────────────────────────────
  {
    id: "log-001", topic: "Логарифми", difficulty: 1,
    condition: "Обчисліть: $$\\log_2 8$$",
    answer: 3, tolerance: null,
    solutionSteps: [
      "$$\\log_2 8 = x \\Leftrightarrow 2^x = 8 = 2^3$$",
      "$$x = 3$$"
    ],
    alternativeSolution: null
  },
  {
    id: "log-002", topic: "Логарифми", difficulty: 1,
    condition: "Обчисліть: $$\\log_{10} 1000$$",
    answer: 3, tolerance: null,
    solutionSteps: [
      "$$\\log_{10} 1000 = \\log_{10} 10^3 = 3$$"
    ],
    alternativeSolution: null
  },
  {
    id: "log-003", topic: "Логарифми", difficulty: 2,
    condition: "Обчисліть: $$\\log_3 9 + \\log_3 3$$",
    answer: 3, tolerance: null,
    solutionSteps: [
      "$$\\log_3 9 = \\log_3 3^2 = 2$$",
      "$$\\log_3 3 = 1$$",
      "$$2 + 1 = 3$$"
    ],
    alternativeSolution: [
      "Властивість логарифмів: $$\\log_3 9 + \\log_3 3 = \\log_3(9 \\cdot 3) = \\log_3 27 = \\log_3 3^3 = 3$$"
    ]
  },
  {
    id: "log-004", topic: "Логарифми", difficulty: 2,
    condition: "Знайдіть \\(x\\): $$\\log_5 x = 2$$",
    answer: 25, tolerance: null,
    solutionSteps: [
      "За означенням логарифма: $$x = 5^2 = 25$$"
    ],
    alternativeSolution: null
  },
  {
    id: "log-005", topic: "Логарифми", difficulty: 3,
    condition: "Обчисліть: $$\\log_2 6 - \\log_2 3$$",
    answer: 1, tolerance: null,
    solutionSteps: [
      "$$\\log_2 6 - \\log_2 3 = \\log_2 \\frac{6}{3} = \\log_2 2 = 1$$"
    ],
    alternativeSolution: null
  },
  {
    id: "log-006", topic: "Логарифми", difficulty: 3,
    condition: "Розв'яжіть рівняння: $$\\log_2(x+1) = 3$$",
    answer: 7, tolerance: null,
    solutionSteps: [
      "$$x + 1 = 2^3 = 8$$",
      "$$x = 7$$",
      "Перевірка: \\(\\log_2 8 = 3\\) ✓"
    ],

// ════════════════════════════════════════════════════════════════
function loadStateFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object') {
        state = {
          correctCount:   typeof parsed.correctCount === 'number'   ? parsed.correctCount   : 0,
          incorrectCount: typeof parsed.incorrectCount === 'number' ? parsed.incorrectCount : 0,
          allSeenIds:     Array.isArray(parsed.allSeenIds)          ? parsed.allSeenIds     : []
        };
        return;
      }
    }
  } catch (_) { /* fall through */ }
  state = { ...DEFAULT_STATE };
}

function saveStateToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (_) {}
}

function getFilteredTasks() {
  if (!selectedTopic) return TASKS;
  return TASKS.filter(t => t.topic === selectedTopic);
}

function getSeenSet(key) {
  if (!seenPerTopic.has(key)) seenPerTopic.set(key, new Set());
  return seenPerTopic.get(key);
}

function getSessionCounter(key, total) {
  if (!sessionCounterPerTopic.has(key)) {
    sessionCounterPerTopic.set(key, { n: 0, total });
  }
  const c = sessionCounterPerTopic.get(key);
  c.total = total; // update in case tasks changed
  return c;
}

// ════════════════════════════════════════════════════════════════
//  PROGRESS PANEL
// ════════════════════════════════════════════════════════════════
function renderProgressPanel() {
  const panel = document.getElementById('progress-panel');
  panel.innerHTML = '';

  // Collect all topics that have been visited this session
  const lines = [];

  // Always show global if > 0 tasks done
  const allCounter = sessionCounterPerTopic.get('__all__');
  if (allCounter && allCounter.n > 0) {
    lines.push({ label: 'Всього', n: allCounter.n, total: TASKS.length });
  }

  // Show per-topic lines for topics visited this session (except current duplicated if '__all__' is selected)
  seenPerTopic.forEach((seenSet, key) => {
    if (key === '__all__') return; // handled above
    const topicTasks = TASKS.filter(t => t.topic === key);
    const topicCounter = sessionCounterPerTopic.get(key);
    if (topicCounter && topicCounter.n > 0) {
      lines.push({ label: key, n: topicCounter.n, total: topicTasks.length });
    }
  });

  if (lines.length === 0 && currentTask) {
    // Show placeholder before first answer
    const filtered = getFilteredTasks();
    const key = selectedTopic || '__all__';
    const total = filtered.length;
    const p = document.createElement('div');
    p.className = 'progress-line';
    p.textContent = `${selectedTopic ? selectedTopic : 'Всього'}: — з ${total}`;
    panel.appendChild(p);
    return;
  }

  lines.forEach(({ label, n, total }) => {
    const p = document.createElement('div');
    p.className = 'progress-line';
    p.innerHTML = `<strong>${label}:</strong> ${n} з ${total}`;
    panel.appendChild(p);
  });
}

// ════════════════════════════════════════════════════════════════
//  FILTER UI
// ════════════════════════════════════════════════════════════════
function buildFilterUI() {
  const sel = document.getElementById('topic-select');
  const topics = [...new Set(TASKS.map(t => t.topic))].sort();
  sel.innerHTML = '<option value="">Усі теми</option>';
  topics.forEach(topic => {
    const opt = document.createElement('option');
    opt.value = topic;
    opt.textContent = topic;
    sel.appendChild(opt);
  });
  sel.value = selectedTopic;
}

// ════════════════════════════════════════════════════════════════
//  TASK PICKING
// ════════════════════════════════════════════════════════════════
function pickNextTask() {
  const filtered = getFilteredTasks();

  if (filtered.length === 0) {
    showEmptyState(true);
    currentTask = null;
    return;
  }
  showEmptyState(false);

  const key = selectedTopic || '__all__';
  const seenSet = getSeenSet(key);
  let unseen = filtered.filter(t => !seenSet.has(t.id));

  const allSeenMsg = document.getElementById('all-seen-msg');

  if (unseen.length === 0) {
    allSeenMsg.textContent = 'Ви переглянули всі задачі цієї теми! Починаємо знову.';
    allSeenMsg.classList.add('visible');
    seenSet.clear();
    unseen = [...filtered];
  } else {
    allSeenMsg.classList.remove('visible');
  }

  currentTask = unseen[Math.floor(Math.random() * unseen.length)];
  seenSet.add(currentTask.id);

  // Also track per-topic when in "all" mode
  if (!selectedTopic) {
    const topicSet = getSeenSet(currentTask.topic);
    topicSet.add(currentTask.id);
  }

  // Increment counters
  const counter = getSessionCounter(key, filtered.length);
  counter.n++;

  // Also increment topic counter when in "all" mode
  if (!selectedTopic) {
    const topicTasks = TASKS.filter(t => t.topic === currentTask.topic);
    const tc = getSessionCounter(currentTask.topic, topicTasks.length);
    tc.n++;
  }

  renderProgressPanel();
}

// ════════════════════════════════════════════════════════════════
//  RENDER TASK
// ════════════════════════════════════════════════════════════════
function renderTask(task) {
  if (!task) return;

  document.getElementById('badge-topic').textContent = task.topic;
  document.getElementById('badge-difficulty').textContent = DIFFICULTY_LABELS[task.difficulty] || '';

  const condEl = document.getElementById('task-condition');
  condEl.textContent = task.condition;
  renderMathInElement(condEl, KATEX_OPTIONS);
}

// ════════════════════════════════════════════════════════════════
//  RESET TASK UI
// ════════════════════════════════════════════════════════════════
function resetTaskUI() {
  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = '';
  input.disabled = false;
  input.removeAttribute('disabled');

  document.getElementById('validation-message').textContent = '';
  document.getElementById('btn-check').disabled = false;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('feedback-area').hidden = true;
  document.getElementById('btn-alt-solution').hidden = true;
  document.getElementById('all-seen-msg').classList.remove('visible');

  isAltSolutionShown = false;
}

// ════════════════════════════════════════════════════════════════
//  SHOW EMPTY STATE
// ════════════════════════════════════════════════════════════════
function showEmptyState(show) {
  document.getElementById('empty-state').classList.toggle('visible', show);
  document.getElementById('task-meta').style.display = show ? 'none' : '';
  document.getElementById('task-condition').style.display = show ? 'none' : '';
  document.getElementById('answer-area').style.display = show ? 'none' : '';
  document.getElementById('btn-check').style.display = show ? 'none' : '';
  document.getElementById('feedback-area').hidden = true;
}

// ════════════════════════════════════════════════════════════════
//  RENDER SOLUTION STEPS
// ════════════════════════════════════════════════════════════════
function renderSteps(steps) {
  const container = document.getElementById('solution-steps');
  const ol = document.createElement('ol');
  steps.forEach(step => {
    const li = document.createElement('li');
    li.textContent = step;
    ol.appendChild(li);
  });
  container.innerHTML = '';
  container.appendChild(ol);
  renderMathInElement(container, KATEX_OPTIONS);
}

// ════════════════════════════════════════════════════════════════
//  CHECK ANSWER
// ════════════════════════════════════════════════════════════════
function checkAnswer() {
  const input = document.getElementById('answer-input');
  const validMsg = document.getElementById('validation-message');
  validMsg.textContent = '';
  input.classList.remove('input--error');

  // Step 1: trim + normalize
  let raw = input.value;
  let trimmed = raw.trim();
  trimmed = trimmed.replace(',', '.'); // only first comma
  trimmed = trimmed.replace(/\s/g, '');

  // Step 2: empty check
  if (trimmed === '') {
    validMsg.textContent = 'Введіть відповідь';
    input.classList.add('input--error');
    return;
  }

  // Step 3: format check
  if (!REGEX_NUMBER.test(trimmed)) {
    validMsg.textContent = 'Введіть числове значення';
    input.classList.add('input--error');
    return;
  }

  // Step 4: parse
  const userAnswer = parseFloat(trimmed);

  // Step 5: sanity
  if (isNaN(userAnswer) || !isFinite(userAnswer)) {
    validMsg.textContent = 'Некоректне значення';
    input.classList.add('input--error');
    return;
  }

  // Step 6: tolerance
  const tolerance = (currentTask.tolerance !== null && currentTask.tolerance !== undefined)
    ? currentTask.tolerance
    : 0.01;

  // Step 7: compare
  const isCorrect = Math.abs(userAnswer - currentTask.answer) <= tolerance;

  // Step 8: update state
  if (isCorrect) state.correctCount++;
  else state.incorrectCount++;

  if (!state.allSeenIds.includes(currentTask.id)) {
    state.allSeenIds.push(currentTask.id);
  }
  saveStateToStorage();

  // Step 9: update UI
  input.classList.remove('input--error');
  input.classList.add(isCorrect ? 'input--correct' : 'input--incorrect');
  input.disabled = true;
  document.getElementById('btn-check').disabled = true;
  document.getElementById('btn-next').disabled = false;

  // Feedback
  const feedbackArea = document.getElementById('feedback-area');
  feedbackArea.hidden = false;

  const statusEl = document.getElementById('feedback-status');
  const iconEl = statusEl.querySelector('.status-icon');
  const textEl = document.getElementById('feedback-text');

  if (isCorrect) {
    statusEl.className = 'status--correct';
    iconEl.textContent = '✓';
    textEl.textContent = 'Правильно!';
  } else {
    statusEl.className = 'status--incorrect';
    iconEl.textContent = '✗';
    textEl.textContent = 'Неправильно';
  }

  const answerDisplay = document.getElementById('correct-answer-display');
  const answerVal = Number.isInteger(currentTask.answer)
    ? currentTask.answer
    : currentTask.answer.toString().replace('.', ',');
  answerDisplay.innerHTML = `Правильна відповідь: <strong>${answerVal}</strong>`;

  renderSteps(currentTask.solutionSteps);

  const altBtn = document.getElementById('btn-alt-solution');
  const hasAlt = Array.isArray(currentTask.alternativeSolution) && currentTask.alternativeSolution.length > 0;
  altBtn.hidden = !hasAlt;
  if (hasAlt) {
    altBtn.textContent = 'Інший спосіб пояснення';
    isAltSolutionShown = false;
  }

  renderMathInElement(feedbackArea, KATEX_OPTIONS);
}

// ════════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════════════════
function bindEvents() {
  // Check button
  document.getElementById('btn-check').addEventListener('click', checkAnswer);

  // Enter key in input
  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAnswer();
  });

  // Next task
  document.getElementById('btn-next').addEventListener('click', () => {
    resetTaskUI();
    pickNextTask();
    if (currentTask) renderTask(currentTask);
  });

  // Reset progress
  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!confirm('Скинути весь прогрес? Цю дію не можна скасувати.')) return;
    localStorage.removeItem(STORAGE_KEY);
    state = { ...DEFAULT_STATE };
    seenPerTopic.clear();
    sessionCounterPerTopic.clear();
    renderProgressPanel();
  });

  // Filter change
  document.getElementById('topic-select').addEventListener('change', function () {
    const newTopic = this.value;

    // If there's an active unchecked task — ask confirmation
    const inputHasValue = document.getElementById('answer-input').value.trim() !== '';
    const feedbackHidden = document.getElementById('feedback-area').hidden;

    if (inputHasValue && feedbackHidden) {
      if (!confirm('Змінити тему? Поточна незавершена задача буде втрачена.')) {
        this.value = selectedTopic; // revert
        return;
      }
    }

    selectedTopic = newTopic;
    resetTaskUI();
    document.getElementById('all-seen-msg').classList.remove('visible');
    showEmptyState(false);
    pickNextTask();
    if (currentTask) renderTask(currentTask);
  });

  // Alt solution toggle
  document.getElementById('btn-alt-solution').addEventListener('click', () => {
    if (!currentTask) return;
    isAltSolutionShown = !isAltSolutionShown;
    const btn = document.getElementById('btn-alt-solution');
    if (isAltSolutionShown) {
      renderSteps(currentTask.alternativeSolution);
      btn.textContent = 'Основний спосіб';
    } else {
      renderSteps(currentTask.solutionSteps);
      btn.textContent = 'Інший спосіб пояснення';
    }
  });
}

// ════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════
function initApp() {
  loadStateFromStorage();
  buildFilterUI();
  bindEvents();
  pickNextTask();
  if (currentTask) renderTask(currentTask);
  renderProgressPanel();
}
</script>

<script>

  // Функція, яка знайде твої поля на сайті, забере дані та відправить у базу
  async function registerUser() {
    // Шукаємо твою пошту та пароль (використовуємо твої ID: user-email та user-pass)
    const emailInput = document.getElementById('user-email');
    const passwordInput = document.getElementById('user-pass');
    const msg = document.getElementById('reg-msg');

    if (!emailInput || !passwordInput) {
      alert("Помилка: на сторінці не знайдено полей з ID 'user-email' або 'user-pass'!");
      return;
    }

    const email = emailInput.value;
    const password = passwordInput.value;

    if (!email || password.length < 8) {
      if (msg) msg.textContent = 'Введіть пошту та пароль від 8 символів!';
      else alert('Введіть пошту та пароль від 8 символів!');
      return;
    }

    try {
      await pb.collection('users').create({
        email: email,
        password: password,
        passwordConfirm: password,
      });
      if (msg) msg.textContent = 'Акаунт успішно створено! 🎉';
      else alert('Акаунт успішно створено! 🎉');
    } catch (error) {
      if (msg) msg.textContent = 'Помилка: ' + error.message;
      else alert('Помилка: ' + error.message);
    }
  }
</script>
